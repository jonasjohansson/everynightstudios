<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Calibrate — cap text anchors</title>
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; margin: 0; padding: 16px; background: #f7f7f5; color: #222; }
    header { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    #stage { position: relative; display: inline-block; border: 1px solid #ccc; user-select: none; background: #fff; }
    #stage img { display: block; max-width: 700px; height: auto; }
    #box { position: absolute; border: 2px solid #e84b2a; background: rgba(232,75,42,0.15); pointer-events: none; }
    progress { vertical-align: middle; width: 160px; }
    button { padding: 6px 12px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; font: inherit; }
    button:hover { background: #f5f5f5; }
    p { color: #666; max-width: 700px; }
  </style>
</head>
<body>
  <header>
    <span id="label"></span>
    <progress id="prog" value="0" max="1"></progress>
    <button id="prev">◀ prev</button>
    <button id="next">next ▶</button>
    <button id="download">download caps.json</button>
  </header>
  <div id="stage">
    <img id="cap-img" alt="">
    <div id="box" hidden></div>
  </div>
  <p>Click-drag on the cap front to set the text anchor. Arrow keys nudge (hold Shift for larger step). Enter = next cap.</p>
  <script type="module" src="calibrate.js"></script>
</body>
</html>
